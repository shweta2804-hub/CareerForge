services:
  - type: web
    name: careerforge-api
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: careerforge-db
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: BACKEND_CORS_ORIGINS
        value: "*"
    healthCheckPath: /health
    autoDeploy: true
    postDeployCommand: alembic upgrade head

databases:
  - name: careerforge-db
    plan: free
    databaseName: careerforge
    user: careerforge_user