version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: careerforge_postgres
    environment:
      POSTGRES_USER: careerforge
      POSTGRES_PASSWORD: careerforge123
      POSTGRES_DB: careerforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careerforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: careerforge_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://careerforge:careerforge123@postgres:5432/careerforge
      - SECRET_KEY=your-secret-key-here-change-in-production
      - DEBUG=True
      - CLOUDINARY_CLOUD_NAME=your-cloud-name
      - CLOUDINARY_API_KEY=your-api-key
      - CLOUDINARY_API_SECRET=your-api-secret
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: